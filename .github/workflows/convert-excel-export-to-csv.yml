name: Convert reservation export to CSV

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/convert-excel-export-to-csv.yml'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace Excel export with CSV export
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('src/app/admin/events/[id]/reservations/page.tsx')
          text = path.read_text(encoding='utf-8')

          text = text.replace("import * as XLSX from 'xlsx';\n", '')

          helper_anchor = "function formatDateTime(dateStr: string | null): string {"
          helpers = """function escapeCsvCell(value: string): string {
            return `\"${value.replace(/\"/g, '\"\"')}\"`;
          }

          function safeFileName(value: string): string {
            return value.replace(/[\\/:*?\"<>|\\s]+/g, '_').replace(/^_+|_+$/g, '') || 'event';
          }

          """
          if 'function escapeCsvCell' not in text:
              text = text.replace(helper_anchor, helpers + helper_anchor)

          start = text.index('  // Excel Exporter')
          end = text.index('\n\n  if (authLoading || loading)', start)

          csv_function = """  // CSV Exporter
          const handleExportCsv = () => {
            if (reservations.length === 0) {
              alert('エクスポートする予約データがありません。');
              return;
            }

            const headers = [
              '企画名',
              '開催枠',
              '券種',
              '氏名',
              '学籍番号',
              '大学メール',
              '状態',
              '申込日時',
              '使用日時',
              '取消日時',
              'チケットコード',
            ];

            const statusLabel = {
              reserved: '有効',
              used: '使用済み',
              cancelled: 'キャンセル',
            } as const;

            const ticketTypeLabel = {
              reservation: '予約券',
              walkin: '当日券',
            } as const;

            const sortedReservations = [...reservations].sort((a, b) => {
              const slotCompare = (a.event_slots?.label || '').localeCompare(
                b.event_slots?.label || '',
                'ja',
                { numeric: true },
              );
              if (slotCompare !== 0) return slotCompare;

              const typeCompare = ticketTypeLabel[a.ticket_type].localeCompare(
                ticketTypeLabel[b.ticket_type],
                'ja',
              );
              if (typeCompare !== 0) return typeCompare;

              return (a.student_name || '').localeCompare(b.student_name || '', 'ja');
            });

            const rows = sortedReservations.map((res) => [
              eventTitle,
              res.event_slots?.label || '-',
              ticketTypeLabel[res.ticket_type],
              res.student_name || '',
              res.student_number || '',
              res.university_email || '',
              statusLabel[res.status],
              formatDateTime(res.created_at),
              res.used_at ? formatDateTime(res.used_at) : '',
              res.cancelled_at ? formatDateTime(res.cancelled_at) : '',
              res.ticket_code || '',
            ]);

            const csv = [headers, ...rows]
              .map((row) => row.map((cell) => escapeCsvCell(String(cell))).join(','))
              .join('\\r\\n');

            const blob = new Blob([`\\uFEFF${csv}`], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const timestamp = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });

            link.href = url;
            link.download = `reservations_${safeFileName(eventTitle)}_${timestamp}.csv`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
          };"""

          text = text[:start] + csv_function + text[end:]
          text = text.replace('onClick={handleExportExcel}', 'onClick={handleExportCsv}')
          text = text.replace('📥 Excel出力', '📥 CSV出力')

          if "import * as XLSX" in text or "handleExportExcel" in text or "Excel出力" in text:
              raise RuntimeError('Excel export code remains after replacement')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/convert-excel-export-to-csv.yml

      - name: Commit changes
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/app/admin/events/'[id]'/reservations/page.tsx .github/workflows/convert-excel-export-to-csv.yml
          git commit -m 'Replace Excel export with CSV export'
          git push
