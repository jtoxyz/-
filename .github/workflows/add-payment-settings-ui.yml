name: Add payment settings UI

on:
  push:
    paths:
      - .github/triggers/payment-settings-ui.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply payment settings UI
        run: python scripts/add-payment-settings-ui.py
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add payment settings to event forms"
          git push
