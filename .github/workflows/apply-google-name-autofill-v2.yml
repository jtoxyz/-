name: Apply Google name autofill v2

on:
  push:
    paths:
      - .github/triggers/google-name-autofill-v2.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply source change
        run: python scripts/autofill-google-name.py
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Commit source change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Autofill reservation name from Google account"
          git push
