name: Apply Google name autofill

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/autofill-google-name.py
      - .github/workflows/apply-google-name-autofill.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: python scripts/autofill-google-name.py
      - run: npm ci
      - run: npm run build
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/events/[id]/page.tsx
          git diff --cached --quiet || git commit -m "Autofill reservation name from Google account"
          git push
