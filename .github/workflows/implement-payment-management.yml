name: Implement payment management

on:
  push:
    paths:
      - .github/triggers/payment-management.txt

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply payment admin changes
        run: python scripts/implement-payment-admin.py
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Add payment status management to reservations"
          git push
