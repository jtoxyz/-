name: Remove event-level reservation window fields

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/remove-event-level-reservation-window.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicated event-level reservation date fields
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('src/app/admin/events/new/page.tsx'),
              Path('src/app/admin/events/[id]/page.tsx'),
          ]

          common_replacements = (
              ("  const [reservationStartsAt, setReservationStartsAt] = useState('');\n", ''),
              ("  const [reservationEndsAt, setReservationEndsAt] = useState('');\n", ''),
              (
                  'reservation_starts_at: reservationStartsAt ? new Date(reservationStartsAt).toISOString() : null,',
                  'reservation_starts_at: null,',
              ),
              (
                  'reservation_ends_at: reservationEndsAt ? new Date(reservationEndsAt).toISOString() : null,',
                  'reservation_ends_at: null,',
              ),
          )

          edit_only_replacements = (
              ("        setReservationStartsAt(formatIsoToLocalString(data.reservation_starts_at));\n", ''),
              ("        setReservationEndsAt(formatIsoToLocalString(data.reservation_ends_at));\n", ''),
          )

          section_marker = '2. 日程・受付時間設定'
          ui_start_marker = "            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '16px' }}>"
          ui_end_marker = '            {/* Slot selection mode */}'

          for path in paths:
              text = path.read_text(encoding='utf-8')

              for old, new in common_replacements:
                  if text.count(old) != 1:
                      raise RuntimeError(f'{path}: expected text was not found exactly once: {old}')
                  text = text.replace(old, new, 1)

              if '[id]' in str(path):
                  for old, new in edit_only_replacements:
                      if text.count(old) != 1:
                          raise RuntimeError(f'{path}: expected edit initializer was not found exactly once: {old}')
                      text = text.replace(old, new, 1)

              section_index = text.index(section_marker)
              start_index = text.index(ui_start_marker, section_index)
              end_index = text.index(ui_end_marker, start_index)
              text = text[:start_index] + text[end_index:]

              forbidden = (
                  'const [reservationStartsAt, setReservationStartsAt]',
                  'const [reservationEndsAt, setReservationEndsAt]',
                  'setReservationStartsAt(formatIsoToLocalString(data.reservation_starts_at))',
                  'setReservationEndsAt(formatIsoToLocalString(data.reservation_ends_at))',
                  'value={reservationStartsAt}',
                  'value={reservationEndsAt}',
                  'htmlFor="reservationStartsAt"',
                  'htmlFor="reservationEndsAt"',
              )
              remaining = [item for item in forbidden if item in text]
              if remaining:
                  raise RuntimeError(f'{path}: old event-level fields remain: {remaining}')

              path.write_text(text, encoding='utf-8')
          PY

      - name: Verify production build
        run: |
          npm ci
          npm run build

      - name: Remove one-time workflow
        run: rm .github/workflows/remove-event-level-reservation-window.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/admin/events/new/page.tsx src/app/admin/events/'[id]'/page.tsx .github/workflows/remove-event-level-reservation-window.yml
          git commit -m "Remove duplicated event-level reservation window fields"
          git push

# trigger cleanup workflow
