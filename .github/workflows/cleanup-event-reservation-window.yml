name: Clean up event-level reservation window

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/cleanup-event-reservation-window.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicated event-level reservation fields
        run: |
          python - <<'PY'
          from pathlib import Path

          new_path = Path('src/app/admin/events/new/page.tsx')
          edit_path = Path('src/app/admin/events/[id]/page.tsx')
          public_path = Path('src/app/events/[id]/page.tsx')

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          def remove_event_level_ui(text: str, label: str) -> str:
              start_marker = """            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '16px' }}>
              <div className=\"form-group\">
                <label className=\"form-label\" htmlFor=\"reservationStartsAt\">予約受付開始日時</label>"""
              end_marker = """

            {/* Slot selection mode */}"""
              start = text.find(start_marker)
              if start == -1:
                  raise RuntimeError(f'{label}: event-level reservation UI start not found')
              end = text.find(end_marker, start)
              if end == -1:
                  raise RuntimeError(f'{label}: event-level reservation UI end not found')
              return text[:start] + '            {/* Slot selection mode */}' + text[end + len(end_marker):]

          state_block = """  // Date/Time strings (empty string represents null)
  const [reservationStartsAt, setReservationStartsAt] = useState('');
  const [reservationEndsAt, setReservationEndsAt] = useState('');
  const [useStartsAt, setUseStartsAt] = useState('');
"""
          state_replacement = """  // Date/Time strings (empty string represents null)
  const [useStartsAt, setUseStartsAt] = useState('');
"""

          # New-event page
          text = new_path.read_text(encoding='utf-8')
          text = replace_once(text, state_block, state_replacement, 'new page state')
          text = replace_once(
              text,
              '      reservation_starts_at: reservationStartsAt ? new Date(reservationStartsAt).toISOString() : null,',
              '      reservation_starts_at: null,',
              'new page reservation_starts_at payload',
          )
          text = replace_once(
              text,
              '      reservation_ends_at: reservationEndsAt ? new Date(reservationEndsAt).toISOString() : null,',
              '      reservation_ends_at: null,',
              'new page reservation_ends_at payload',
          )
          text = remove_event_level_ui(text, 'new page')
          new_path.write_text(text, encoding='utf-8')

          # Edit-event page
          text = edit_path.read_text(encoding='utf-8')
          text = replace_once(text, state_block, state_replacement, 'edit page state')
          text = replace_once(
              text,
              '        setReservationStartsAt(formatIsoToLocalString(data.reservation_starts_at));\n',
              '',
              'edit page start initializer',
          )
          text = replace_once(
              text,
              '        setReservationEndsAt(formatIsoToLocalString(data.reservation_ends_at));\n',
              '',
              'edit page end initializer',
          )
          text = replace_once(
              text,
              '            reservationStartsAt: formatIsoToLocalString(s.reservation_starts_at || data.reservation_starts_at),',
              '            reservationStartsAt: formatIsoToLocalString(s.reservation_starts_at),',
              'edit page slot start fallback',
          )
          text = replace_once(
              text,
              '            reservationEndsAt: formatIsoToLocalString(s.reservation_ends_at || data.reservation_ends_at),',
              '            reservationEndsAt: formatIsoToLocalString(s.reservation_ends_at),',
              'edit page slot end fallback',
          )
          text = replace_once(
              text,
              '      reservation_starts_at: reservationStartsAt ? new Date(reservationStartsAt).toISOString() : null,',
              '      reservation_starts_at: null,',
              'edit page reservation_starts_at payload',
          )
          text = replace_once(
              text,
              '      reservation_ends_at: reservationEndsAt ? new Date(reservationEndsAt).toISOString() : null,',
              '      reservation_ends_at: null,',
              'edit page reservation_ends_at payload',
          )
          text = remove_event_level_ui(text, 'edit page')
          edit_path.write_text(text, encoding='utf-8')

          # Public event page
          text = public_path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              '  reservation_starts_at: string | null;\n  reservation_ends_at: string | null;\n',
              '',
              'public page EventDetails fields',
          )
          public_period = """

          <div className=\"info-label\">受付期間</div>
          <div className=\"info-value\">
            {event.reservation_starts_at ? formatDateTime(event.reservation_starts_at) : '制限なし'} 〜 <br />
            {event.reservation_ends_at ? formatDateTime(event.reservation_ends_at) : '制限なし'}
          </div>"""
          text = replace_once(text, public_period, '', 'public page event-level period display')
          public_path.write_text(text, encoding='utf-8')

          # Final assertions: slot-level fields must remain, event-level UI/state must be gone.
          for path in (new_path, edit_path):
              value = path.read_text(encoding='utf-8')
              forbidden = (
                  'const [reservationStartsAt, setReservationStartsAt]',
                  'const [reservationEndsAt, setReservationEndsAt]',
                  'htmlFor="reservationStartsAt">予約受付開始日時',
                  'htmlFor="reservationEndsAt">予約受付終了日時',
                  'value={reservationStartsAt}',
                  'value={reservationEndsAt}',
              )
              leftovers = [item for item in forbidden if item in value]
              if leftovers:
                  raise RuntimeError(f'{path}: old event-level fields remain: {leftovers}')
              if "row.reservationStartsAt" not in value or "row.reservationEndsAt" not in value:
                  raise RuntimeError(f'{path}: slot-level reservation window was accidentally removed')

          public_text = public_path.read_text(encoding='utf-8')
          if '<div className="info-label">受付期間</div>' in public_text:
              raise RuntimeError('public page: old event-level reservation period display remains')
          if 'slot.reservation_starts_at' not in public_text or 'slot.reservation_ends_at' not in public_text:
              raise RuntimeError('public page: slot-level reservation period was accidentally removed')
          PY

      - name: Verify diff
        run: |
          git diff --check
          git diff --stat

      - name: Verify production build
        run: |
          npm ci
          npm run build

      - name: Commit verified changes
        run: |
          rm .github/workflows/cleanup-event-reservation-window.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/admin/events/new/page.tsx src/app/admin/events/'[id]'/page.tsx src/app/events/'[id]'/page.tsx .github/workflows/cleanup-event-reservation-window.yml
          git commit -m "Remove duplicated event-level reservation window fields"
          git push

# Triggered after configuring GitHub Actions secrets.
