name: Implement phase 1 ticket security

on:
  push:
    paths:
      - 'scripts/implement-phase1.mjs'
      - '.github/workflows/implement-phase1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply phase 1 changes
        id: apply
        shell: bash
        run: |
          set +e
          node scripts/implement-phase1.mjs 2>&1 | tee phase1-apply.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload apply log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-apply-log
          path: phase1-apply.log
          retention-days: 1

      - name: Stop after apply failure
        if: steps.apply.outputs.status != '0'
        run: |
          echo 'Phase 1 apply script failed. See phase1-apply-log artifact.'
          exit 1

      - name: Verify diff
        if: steps.apply.outputs.status == '0'
        run: |
          git diff --check
          git diff --stat

      - name: Install dependencies
        if: steps.apply.outputs.status == '0'
        run: npm ci

      - name: Verify production build
        if: steps.apply.outputs.status == '0'
        run: npm run build

      - name: Commit verified changes
        if: steps.apply.outputs.status == '0'
        run: |
          rm .github/workflows/implement-phase1.yml
          rm scripts/implement-phase1.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Implement expired ticket blocking and blacklist management"
          git push
