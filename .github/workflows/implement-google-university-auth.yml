name: Implement university Google authentication

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/implement-google-auth.py
      - .github/workflows/implement-google-university-auth.yml
      - .github/google-auth-trigger

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply implementation
        run: python scripts/implement-google-auth.py

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-auth-build-log
          path: build.log

      - name: Commit changes to pull request branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/events/[id]/page.tsx supabase/migrations/20260724000300_require_google_university_auth.sql
          git diff --cached --quiet && exit 0
          git commit -m "Require university Google authentication for reservations"
          git push
