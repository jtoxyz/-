name: Reduce Cloudflare Worker size

on:
  push:
    branches: [main]
    paths:
      - scripts/reduce-worker-size.py
      - .github/workflows/reduce-cloudflare-worker-size.yml

permissions:
  contents: write

jobs:
  reduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Reduce bundle dependencies
        run: python scripts/reduce-worker-size.py

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://nbhpsjhqaakaweeywhxa.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-for-build-only
        run: npm run build

      - name: Commit reduced bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/app/events/[id]/page.tsx src/app/tickets/[publicToken]/page.tsx src/components/EventPreviewModal.tsx
          git diff --cached --quiet && exit 0
          git commit -m "Reduce Cloudflare Worker bundle size"
          git push
