name: Harden phase 1 ticket security

on:
  push:
    paths:
      - 'scripts/implement-phase1-hardening.mjs'
      - '.github/workflows/harden-phase1-security.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Prepare hardening migration
        run: node scripts/implement-phase1-hardening.mjs

      - name: Verify diff
        run: |
          git diff --check
          git diff --stat

      - name: Install dependencies
        run: npm ci

      - name: Verify production build
        run: npm run build

      - name: Commit verified changes
        run: |
          rm .github/workflows/harden-phase1-security.yml
          rm scripts/implement-phase1-hardening.mjs
          rm -f .github/workflows/rebuild-excel-export.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden blacklist function privileges"
          git push
